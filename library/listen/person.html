<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title>Person</title>

<article class="pauto">
  <section
    id="person"
    bindquery="id:id"
    bindasset="endpoint:api.persons.endpoint"
    data-src="{endpoint}&select=id,first_name,middle_name,last_name,birth&where=id.eq({id})"
    data-header="Accept:application/json+single"
  >
    <h1 globalize-get="person">Person</h1>
    <nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
      <ol class="pl05">
        <li><a href="./database" globalize-get="database">Database</a></li>
        <li><a href="./database/persons.html" globalize-get="persons">Persons</a></li>
        <li data-get="first_name.swe"></li>
      </ol>
    </nav>
    <div class="box cards list mt1 br0-">
      <h6
        id="name"
        class="p1 bcwhitesmoke black08 fwb"
        bindglobal="c:globalize.code"
        data-set="f:first_name.{c:eng};m:middle_name.{c:eng};l:last_name.{c:eng}"
        onifdata-set="([{m}]![])/bindvar:#name:[space][ ]?bindvar:#name:[space][]"
        settext="{f} {m}{space}{l}">
      </h6>
        <figure class="pauto bcwhite lh2">
          <p>
            <i globalize-get="first_name" color="dimgray" width="10rem">First name</i><span data-get="first_name.swe"></span><br>
            <i globalize-get="middle_name" color="dimgray" width="10rem">Middle name</i><span data-set="m:middle_name.swe" onifdata-set="([{m}]:[])/settext:[-]">{m}</span><br>
            <i globalize-get="last_name" color="dimgray" width="10rem">Last name</i><span data-get="last_name.swe"></span><br><br>
            <i globalize-get="gender" color="dimgray" width="10rem">Gender</i><span data-get="gender" maptext="gender"></span><br>
            <i globalize-get="date_of_birth" color="dimgray" width="10rem">Date of birth</i><span data-get="birth.date" format="Y-m-d"></span><br>
            <i globalize-get="country_of_birth" color="dimgray" width="10rem">Country of birth</i><span data-get="birth.country_code"></span>
          </p>
          <p>
            <i globalize-get="ethnicity" color="dimgray" width="10rem">Ethnicity</i>Aramean
          </p>
        </figure>
      </div>
    </section>
</article>
