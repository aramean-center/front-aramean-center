<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../index" src="../_templates/default"></template>
<title globalize-get="database">Database</title>

<section id="database" class="pauto" storage="api">
  <h2 globalize-get="database">Database</h2>
  <hr class="bcred">
  <div class="box cards gut5- br0- bcwhite-" data-iterate="database" data-src="./assets/json/database.json" data-loader="#loader">
    <a data-set="url:url" href="database/{url}">
      <figure class="p05 black08">
        <h4 class="fwb p1" data-get="title.eng"></h4>
        <h7 class="p1 pt0" data-get="description"></h7>
      </figure>
    </a>
  </div>
  <div id="loader" class="loader" flex></div>
</section>
