<dialog
  id="dialog"
  onoverlay-dialog="start:[*]"
  margin="0 auto"
  boxshadow="0px 0px 10px 15px gray"
  border="0"
  bgcolor="white"
  padding="1rem"
  height="100vh"
  screen-xxs="width:[100%]"
  screen-sm="width:[600px]"
  screen-md="width:[800px]"
  screen-lg="width:[900px]"
>
  <button click="overlay-close:#dialog" bgcolor="white" color="red" radius="50%" height="3rem" width="3rem" top="0"
    right="0" fontsize="30px" absolute bold aria-label="close">×</button>
  <section include="../policy/privacy/index.html" height="100%"></section>
</dialog>
