<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../../index" src="../../../_templates/default"></template>
<title></title>

<article class="pauto">
  <section
    id="hymn"
    bindquery="id:id"
    data-src="./assets/json/hymns.json"
    data-iterate="true"
    data-filteritem="id:'{id}'"
    data-onempty="show:#hymn-not-found"
    data-set="title:0.title.eng"
    data-onfinish="doctitle:[{title}]"
  >
    <h1 globalize-get="hymns">Hymns</h1>
    <nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
      <ol class="pl05">
        <li><a href="./database" globalize-get="database">Database</a></li>
        <li><a href="./library/read/" globalize-get="hymns">Hymns</a></li>
        <li data-get="title.syr"></li>
      </ol>
    </nav>
    <div dir="rtl" class="box fdr- shade1 mt1 br0- lh2">
      <h6 class="p1 bcwhitesmoke black08 fwb" data-get="title.syr"></h6>
      <figure class="pauto bcwhite">
        <h3 data-get="hymn.syr"></h3>
      </figure>
    </div>
  </section>
  <section id="hymn-not-found" onshow="hide:#hymn" hide>
    <h1 globalize-get="hymns">Hymns</h1>
    <p globalize-get="hymn_not_found" color="darkgray">Hymn not found.</p>
  </section>
</article>
