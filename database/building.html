<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title>Building</title>

<article class="pauto">
	<section
	  id="building"
    bindquery="id:id"
    bindasset="endpoint:api.buildings.endpoint"
    data-src="{endpoint}&select=*&where=id.eq({id})"
    data-header="Accept:application/json+single"
		data-onsuccess="map--run:#map"
		data-set="title:name.eng"
    data-onfinish="doctitle:[{title}]"
	>
		<h1 globalize-get="building">Building</h1>
		<nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
			<ol class="pl05">
				<li><a href="./database" globalize-get="database">Database</a></li>
				<li><a href="./database/buildings.html" globalize-get="buildings">Buildings</a></li>
				<li data-get="name.eng"></li>
			</ol>
		</nav>
		<div class="box cards list mt1 br0- flc-">
			<h6 class="p1 bcwhitesmoke black08 fwb" bold data-get="name.eng"></h6>
			<figure class="p1 bcwhite">
				<p>Name: <span data-get="name.eng"></span></p>
			</figure>
		</div>

		<section class="bcwhite p2 shade1">
			<h2 globalize-get="location">Location</h2>
			<hr class="bcred">
			<div id="map" data-set="lat:geometry.location.lat;lng:geometry.location.lng"
				map--lat="{lat}" map--lng="{lng}" height="40rem"></div>
		</section>
	</section>
</article>
