<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/persons"></template>
<title globalize-get="persons">Persons</title>

<section class="pauto">
  <h1 globalize-get="persons">Persons</h1>
  <nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
    <ol class="pl05">
      <li><a href="./database" globalize-get="database">Database</a></li>
      <li globalize-get="persons">Persons</li>
    </ol>
  </nav>
  <nav class="tabs mt1" id="test">
    <input type="radio" name="panel" id="tabalive" checked>
    <label for="tabalive" id="alive" ondata-bindheaderchange="split:[/][1];insertafterbegin:[Alive (];insertbeforeend:[)]"></label>
    <section class="lg_p0 shade1">
      <div id="personsalive" class="box cards list br0-"
        onifbindfield="([{search}]![])/insertbeforeend:#.data-src:[,first_name->>eng.ilike({search}*)]"
        bindasset="endpoint:api.persons.endpoint"
        data-src="{endpoint}&column=id,first_name,middle_name,last_name,birth,gender&where=death.eq(null),ethnicity.cs([1])"
        data-header="Prefer:count=exact"
        data-bindheader="content-range:#alive"
        data-iterate="true"
        data-loader="#loader"
        data-onempty="#empty"
      >
        <a data-set="id:id" href="database/person.html?id={id}">
          <figure class="p1 bcwhite bcblack001_h">
            <img data-set="code:birth.country_code"
              setsrc="https://cdn.front.nu/dist/design/front/flags/famfamfam/{code}.gif" class="f0">
            <p class="f2" paddingleft="0.5rem">
              <span bindglobal="l:globalize.code" data-get="first_name.{l:eng}"></span>&nbsp;<span
                bindglobal="l:globalize.code" data-set="m:middle_name.{l:eng}"
                onifdata-set="([{m}]![])/settext:[{m}&nbsp;]"></span><span bindglobal="l:globalize.code"
                data-get="last_name.{l:eng}"></span>
            </p>
            <p class="tar" data-get="birth.date" chronotize-age></p>
          </figure>
        </a>
      </div>
      <div id="empty" color="gray" padding="2rem" hide align="center">No matches found.</div>
      <div id="loader" class="loader" flex></div>
    </section>
