<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title globalize-get="watch">Watch</title>

<section id="register" class="pauto" storage="api">
	<h2 globalize-get="videos">Videos</h2>
	<hr class="bcred">
	<div grid class="cards gut5-"
	bgcolor="white"
  screen-xxs="gridcolumns:[1fr]"
	screen-xs="gridcolumns:[1fr]"
	screen-sm="gridcolumns:[1fr 1fr]"
	screen-md="gridcolumns:[1fr 1fr]"
	screen-lg="gridcolumns:[1fr 1fr 1fr]"
	screen-xl="gridcolumns:[1fr 1fr 1fr 1fr]"
	screen-xxl="gridcolumns:[1fr 1fr 1fr 1fr 1fr]"
	screen-wide="gridcolumns:[1fr 1fr 1fr 1fr 1fr 1fr]"
	data-src="./assets/json/watch.json" data-iterate="videos">
		<a data-set="url:url" href="{url}" target="_blank">
			<figure flex flexdirection="column" class="p1 z09 black08">
				<img class="w100 m0a" data-get="thumbnail">
				<figcaption class="fwb p05" data-get="title"></figcaption>
			</figure>
		</a>
	</div>

	<h2 globalize-get="gifs">GIFs</h2>
	<hr class="bcred">
	<div grid class="cards gut5-"
	bgcolor="white"
  screen-xxs="gridcolumns:[1fr]"
	screen-xs="gridcolumns:[1fr]"
	screen-sm="gridcolumns:[1fr 1fr]"
	screen-md="gridcolumns:[1fr 1fr]"
	screen-lg="gridcolumns:[1fr 1fr 1fr]"
	screen-xl="gridcolumns:[1fr 1fr 1fr 1fr]"
	screen-xxl="gridcolumns:[1fr 1fr 1fr 1fr 1fr]"
	screen-wide="gridcolumns:[1fr 1fr 1fr 1fr 1fr 1fr]"
	data-src="./assets/json/watch.json" data-iterate="gifs">
		<figure class="p05 z09 black08">
			<img class="w100 m0a" data-get="thumbnail">
		</figure>
	</div>

	<h2 globalize-get="graphics">Graphics</h2>
	<hr class="bcred">
	<div grid class="cards gut5-"
	bgcolor="white"
  screen-xxs="gridcolumns:[1fr]"
	screen-xs="gridcolumns:[1fr]"
	screen-sm="gridcolumns:[1fr 1fr]"
	screen-md="gridcolumns:[1fr 1fr]"
	screen-lg="gridcolumns:[1fr 1fr 1fr]"
	screen-xl="gridcolumns:[1fr 1fr 1fr 1fr]"
	screen-xxl="gridcolumns:[1fr 1fr 1fr 1fr 1fr]"
	screen-wide="gridcolumns:[1fr 1fr 1fr 1fr 1fr 1fr]"
	data-src="./assets/json/watch.json" data-iterate="graphics">
		<figure class="p05 z09 black08">
			<video class="w100" controls>
				<source data-get="video_url" type="video/mp4">
			</video>
		</figure>
	</div>
</section>
