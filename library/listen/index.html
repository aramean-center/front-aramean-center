<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title globalize-get="listen">Listen</title>

<section id="register" class="pauto">
  <h2 globalize-get="music">Music</h2>
  <hr bgcolor="red">
  <div id="music" class="box cards gut5- br0- flc-"
    data-iterate="true"
    bindasset="endpoint:api.persons.endpoint"
    data-src="{endpoint}&select=id,first_name,middle_name,last_name,artwork&where=artwork.neq(null),artwork->>music.neq(null)"
  >
    <figure align="center" padding="1rem" bgcolor="white">
      <a data-set="pid:id;aid:artwork.music.album.id" href="./library/listen/music/?person={pid}&id={aid}">
        <p><i class="icon icon128 circled pr0">&#9834;</i></p>
        <h7 data-get="artwork.music.album.title.eng" lineheight="1.3" bold></h7>
        <small data-get="artwork.music.album.release_date"></small>
        <small margintop="0.5rem">
          <a
            bindglobal="c:globalize.code"
            data-set="f:first_name.{c:eng};m:middle_name.{c:eng};l:last_name.{c:eng}"
            onifdata-set="([{m}]![])/bindvar:#name:[space][ ]?bindvar:#name:[space][]"
            settext="{f} {m} {l}"
            data-get="pid:id"
            href="database/person.html?id={pid}">
          </a></small>
      </a>
    </figure>
  </div>
</section>
