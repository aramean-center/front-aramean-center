<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/organizations"></template>
<title globalize-get="organizations">Organizations</title>

<section class="pauto" storage="api">
  <h1 globalize-get="organizations">Organizations</h1>
  <nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
    <ol class="pl05">
      <li><a href="./database" globalize-get="database">Database</a></li>
      <li globalize-get="organizations">Organizations</li>
    </ol>
  </nav>
  <nav class="tabs mt1" id="test">
    <input type="radio" name="panel" id="tab1" checked>
    <label for="tab1" id="organizations"
      ondata-bindheaderchange="split:[/][1];insertafterbegin:[Organizations (];insertbeforeend:[)]"></label>
    <section class="lg_p0 shade1">
      <div id="organizationsalive" class="box cards list br0-"
        onifbindfield="([{search}]![])/insertbeforeend:#.data-src:[&where=organization->>eng.ilike({search}*)]"
        bindasset="endpoint:api.organizations.endpoint"
        data-src="{endpoint}&column=*"
        data-header="Prefer:count=exact"
        data-bindheader="content-range:#organizations"
        data-iterate="true"
        data-loader="#loader"
        data-onempty="#empty"
      >
        <a data-set="id:id" href="database/organization.html?id={id}">
          <figure class="p1 bcwhite bcblack001_h">
            <p class="f2" paddingleft="0.5rem">
              <span bindglobal="l:globalize.code" data-get="organization.{l:eng}"></span>
            </p>
            <img data-set="code:geometry.location.country_code"
            setsrc="https://cdn.front.nu/dist/design/front/flags/famfamfam/{code}.gif" align="right" class="f0">
          </figure>
        </a>
      </div>
      <div id="empty" color="gray" padding="2rem" hide align="center">No matches found.</div>
      <div id="loader" class="loader" flex></div>
    </section>
  </nav>
</section>
