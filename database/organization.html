<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title globalize-get="organization">Organization</title>

<article class="pauto" json="words" storage="api" bind="words:?id">
		<section id="building" bindquery="id:id" bindasset="endpoint:api.organizations.endpoint"
			data-src="{endpoint}&select=*&where=id.eq({id})" data-header="Accept:application/json+single"
			data-onsuccess="map--run:#map">
		<h1 globalize-get="organization">Organization</h1>
		<nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
			<ol class="pl05">
				<li><a href="./database" globalize-get="database">Database</a></li>
				<li><a href="./database/organizations.html" globalize-get="organization">Organizations</a></li>
				<li data-get="organization.eng"></li>
			</ol>
		</nav>
		<div class="box cards list mt1 br0- flc-">
			<h6 class="p1 bcwhitesmoke black08 fwb" data-get="organization.eng"></h6>
			<figure class="p1 bcwhite">
				<p>Category: <span data-get="category"></span></p>
			</figure>
			<figure class="p1 bcwhite">
				<p>Type: <span data-get="kind"></span></p>
			</figure>
			<figure class="p1 bcwhite">
				<p>Purpose: <span data-get="purpose"></span></p>
			</figure>
		</div>

		<section class="bcwhite p2 shade1">
			<h2 globalize-get="location">Location</h2>
			<hr class="bcred">
			<div id="map" data-set="lat:geometry.location.lat;lng:geometry.location.lng" map--lat="{lat}" map--lng="{lng}"
				height="40rem"></div>
		</section>
	</section>
</article>
