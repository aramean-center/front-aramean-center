<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title globalize-get="register_ethnicity">Register ethnicity</title>

<article class="wc_xl bcwhite shade1">
	<section id="register" class="pauto" storage="api">
		<h1 globalize-get="page_register_title"></h1>
		<h6 margintop="1rem" marginbottom="2rem" globalize-get="page_register_text"></h6>

		<form class="gaph2-" method="post" bindasset="endpoint:api.persons_collection.endpoint" action="{endpoint}"
			data-onsuccess="hide:#register;show:#complete" data-onerror="show:#error">

			<div class="group lg_fdc outline- gap2 lg_gap0">
				<input name="first_name" type="text" class="f1 phdark bw1 bos8 bocblack02" placeholder="First Name"
					globalize-get="first_name" form-invalid="#first_name_tip:[Please enter your first name]" required>
				<small id="first_name_tip" color="red"></small>
				<input name="middle_name" type="text" class="f1 phdark bw1 bos8 bocblack02" placeholder="Middle Name"
					globalize-get="middle_name">
				<input name="last_name" type="text" class="f1 phdark bw1 bos8 bocblack02" placeholder="Last Name"
					globalize-get="last_name" form-invalid="#last_name_tip:[Please enter your last name]" required>
				<small id="last_name_tip" color="red"></small>
			</div>

			<div class="group">
				<input name="email" type="text" class="phdark f1 bw1 bos8 bocblack02" placeholder="E-mail" globalize-get="email"
					form-invalid="#email_tip:[Please enter your email]" required>
				<small id="email_tip" color="red"></small>
			</div>

			<i globalize-get="date_of_birth">Date of birth</i>
			<div class="box gut2-">
				<select class="phdark bw1 bos8 bocblack02" name="birth_date_year" iterate="1900;2025;i"
					form-invalid="#birth_year_tip:[Please select your birth year]" required>
					<option value="" iterate-skip>-</option>
					<option>{i}</option>
				</select>
				<small id="birth_year_tip" color="red"></small>
				<select class="phdark bw1 bos8 bocblack02" name="birth_date_month" iterate="01;12;i"
					form-invalid="#birth_month_tip:[Please select your birth month]" required>
					<option value="" iterate-skip>-</option>
					<option>{i}</option>
				</select>
				<small id="birth_month_tip" color="red"></small>
				<select class="phdark bw1 bos8 bocblack02" name="birth_date_day" iterate="01;31;i"
					form-invalid="#birth_day_tip:[Please select your birth day]" required>
					<option value="" iterate-skip>-</option>
					<option>{i}</option>
				</select>
				<small id="birth_day_tip" color="red"></small>
			</div>

			<i globalize-get="country_of_birth">Country of birth</i>
			<div class="group">
				<select class="phdark bw1 bos8 bocblack02" id="birth_country" name="birth_country" data-iterate="true"
					bindasset="endpoint:api.countries.endpoint" data-src="{endpoint}&order=country->>eng"
					data-onfinish="append:#residence_country:#birth_country"
					form-invalid="#birth_country_tip:[Please select your country of birth]" required>
					<option value="" data-iterate-skip>-</option>
					<option data-set="id:id" value="{id}" data-get="country.eng"></option>
				</select>
				<small id="birth_country_tip" color="red"></small>
			</div>

			<i globalize-get="country_of_residence">Country of residence</i>
			<div class="group">
				<select class="phdark bw1 bos8 bocblack02" id="residence_country" name="residence_country"
					form-invalid="#residence_country_tip:[Please select your country of residence]" required></select>
				<small id="residence_country_tip" color="red"></small>
			</div>

			<hr>

			<div class="group db">
				<input name="terms" type="checkbox" value="1" class="mr05" form-invalid="#terms_tip:[Please accept the terms]"
					required>
				<span inline globalize-get="page_register_agree_terms">Terms</span>
				<small id="terms_tip" color="red"></small>
			</div>
			<div class="group db">
				<input name="terms" type="checkbox" value="1" class="mr05" form-invalid="#aramean_tip:[Please confirm this]"
					required>
				<span inline globalize-get="page_register_agree_iam_aramean">Aramean</span>
				<small id="aramean_tip" color="red"></small>
			</div>
			<div class="group db">
				<input name="participate" type="checkbox" value="1" class="mr05" checked>
				<span inline globalize-get="page_register_agree_database">Enlist</span>
			</div>

			<div id="error" bgcolor="red" color="yellow" margintop="1rem" marginbottom="2rem" padding="1rem" hide>Something went
				wrong. Please try again.</div>
			<div class="group mt1">
				<input class="button h3" type="submit" value="Submit registration" globalize-get="submit_registration">
			</div>

		</form>

	</section>

	<section id="complete" class="pauto tac" hide>
		<h1 globalize-get="thank_you!">Thank you!</h1>
		<p globalize-get="page_register_complete">Your registration will be reviewed within 24 hours.</p>
		<i class="icon mt2">&#8962;</i><a href="/" globalize-get="go_to_startpage">Go to startpage</a>
	</section>
</article>

<div include="_includes/terms.html"></div>
<section include="_includes/footer.html"></section>
