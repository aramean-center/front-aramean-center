<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/default"></template>
<title globalize-get="watch">Read</title>

<section id="register" class="pauto" storage="api">
	<h2 globalize-get="hymns" id="hymns">Hymns</h2>
	<hr class="bcred">
	<section class="lg_p0 shade1">
		<div id="hymns" class="box cards list br0-" data-src="./assets/json/hymns.json" data-iterate="true">
			<a data-set="id:id" href="./library/read/hymn/?id={id}">
				<figure class="p1 bcwhite bcblack001_h">
					<p class="f2 pl1" data-get="title.eng"></p>
					<p class="tar fs08" data-get="title.syr"></p>
				</figure>
			</a>
		</div>
	</section>

	<h2 class="mt2" globalize-get="psalms" id="psalms">Psalms</h2>
	<hr class="bcred">

	<h2 class="mt2" globalize-get="alphabet" id="alphabet">Alphabet</h2>
	<hr class="bcred">
	<div class="box cards gut5- br0- bcwhite- drtl"
		data-src="./assets/json/learn.json"
		data-iterate="alphabet"
	>
		<figure class="p05 black08">
			<h1 class="fwb p1" data-get="char.arc"></h1>
			<h7 class="pb1" data-get="char.lat"></h7>
		</figure>
	</div>
</section>
