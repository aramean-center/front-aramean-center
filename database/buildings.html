<script src="https://cdn.front.nu/nightly/front.js"></script>
<template srcdoc="../../index" src="../../_templates/buildings"></template>
<title globalize-get="buildings">Buildings</title>

<section class="pauto">
  <h1 globalize-get="buildings">Buildings</h1>
  <nav class="crumbs pointer p05 bos6 bocblack01 bw1 bcsnow mt05 br05 gray w0">
    <ol class="pl05">
      <li><a href="./database" globalize-get="database">Database</a></li>
      <li globalize-get="buildings">Buildings</li>
    </ol>
  </nav>
  <nav class="tabs mt1" id="test">
    <input type="radio" name="panel" id="tabalive" checked>
    <label
      for="tabalive"
      id="alive"
      ondata-bindheaderchange="split:[/][1];insertafterbegin:[Buildings (];insertbeforeend:[)]"></label>
    <section class="lg_p0 shade1">
      <div
        id="buildings"
        class="box cards list br0-"
        bindasset="endpoint:api.buildings.endpoint"
        onbindfield="if:([{search}]![])/insertbeforeend:#.data-src:[&where=name->>eng.ilike(*{search}*)]"
        data-src="{endpoint}&column=*"
        data-header="Prefer:count=exact"
        data-bindheader="content-range:#alive"
        data-iterate="true"
        data-loader="#loader"
        data-onempty="#empty"
      >
        <a data-set="id:id" href="database/building.html?id={id}">
          <figure padding="1rem" bgcolor="white" height="1.5rem">
            <p class="f2" paddingleft="0.5rem">
              <span bindglobal="l:globalize.code" data-get="name.{l:eng}"></span>
            </p>
            <img data-set="code:geometry.location.country_code" setsrc="https://cdn.front.nu/dist/design/front/flags/famfamfam/{code}.gif" align="right" class="f0">
          </figure>
        </a>
      </div>
      <div id="empty" color="gray" padding="2rem" hide align="center">No matches found.</div>
      <div id="loader" class="loader" flex></div>
    </section>
  </nav>
</section>
